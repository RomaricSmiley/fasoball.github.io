<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Télécharger l'application</title>

  <script>
    window.onload = function () {
      const playStore =
        "https://play.google.com/store/apps/details?id=com.fasoball.app";
      const appStore =
        "https://apps.apple.com/bf/app/fasoball/id6757640579?l=fr-FR";

      const ua = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(ua)) {
        window.location.href = playStore;
      } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = appStore;
      }
    };
  </script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      padding:40px;
    }
    a{
      display:inline-block;
      margin:10px;
      padding:15px 25px;
      text-decoration:none;
      border-radius:10px;
      background:#111;
      color:white;
    }
  </style>
</head>
<body>
  <h1>Télécharger l'application</h1>
  <p>Choisissez votre store si la redirection ne se fait pas automatiquement.</p>

  <a href="https://play.google.com/store/apps/details?id=com.docstore.app">
    Google Play
  </a>

  <a href="https://apps.apple.com/bf/app/docstore-coffre-%C3%A0-documents/id6759832951?l=fr-FR">
    App Store
  </a>
</body>
</html>
